<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 260px; padding: 12px; font-family: system-ui; font-size: 13px; margin: 0; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    .label { font-weight: 600; }
    .url { color: #666; font-size: 11px; word-break: break-all; }
    .token-section { margin: 8px 0; }
    .token-section label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; }
    input[type="password"] { width: 100%; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 11px; font-family: monospace; box-sizing: border-box; }
    .token-hint { font-size: 10px; color: #999; margin-top: 2px; }
    button { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; margin-top: 8px; }
    button:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span class="label" id="label">Checking...</span>
  </div>
  <div class="url">ws://127.0.0.1:12307/ws</div>
  <div class="token-section">
    <label for="token">Auth Token</label>
    <input type="password" id="token" placeholder="Paste token from ~/.browser-mcp-secrets.json">
    <div class="token-hint" id="tokenHint"></div>
  </div>
  <button id="btn">Connect</button>
  <script src="popup.js"></script>
</body>
</html>
